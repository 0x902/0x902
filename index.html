<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>QRapid &mdash; QR Generator</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header class="block">
            <img height="80px" src="logo.png" alt="site-logo" />
        </header>
        <main class="block">
            <div class="content">
                <h1>Convert your<br />link to QR code.</h1>
                <form>
                    <input
                        class="input-url"
                        type="text"
                        placeholder="https://"
                        required
                        autocomplete="on"
                        spellcheck="false"
                    />
                    <button class="btn-generate" type="submit">Generate</button>
                </form>
                <label class="alert hidden">:: invalid url</label>
                <p>
                    Your QR code will be generated automatically, your generated
                    QR code will open this URL.
                </p>
            </div>
            <div class="result hidden">
                <p class="url"><a href="#">https://</a></p>
                <div class="qrcode"></div>
                <div class="result-actions">
                    <button class="btn-download btn-secondary">
                        Download QR
                    </button>
                    <!-- <div class="select-container">
                        <label for="select-format">File Format:</label>
                        <select name="file-format" id="select-format">
                            <option value="png">PNG</option>
                            <option value="png">JPG</option>
                            <option value="png">SVG</option>
                        </select>
                    </div> -->
                </div>
            </div>
        </main>
        <footer>
            Made with ❤️ by
            <a target="_blank" href="https://0x902.netlify.app">0x902</a>
        </footer>
        <script src="qrcode.js"></script>
        <script src="script.js"></script>
    </body>
</html>
